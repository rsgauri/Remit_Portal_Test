<!DOCTYPE html>
<html>
<head>
    <title>Add Source</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        form {
            background: white;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>RDA Portal</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/clients">Client Master</a>
    <a href="/sources">Source Master</a>
    <a href="/remittance">Remittance Advice</a>
</div>

<div class="content">
    <h1>Add New Source</h1>
    
    <form method="POST">
        <label>Client:</label>
        <select name="client_id" required>
            <option value="">-- Select Client --</option>
            {% for client in clients %}
            <option value="{{ client.id }}">{{ client.name }}</option>
            {% endfor %}
        </select>
        
        <label>Source Name:</label>
        <input type="text" name="name" required>
        
        <label>Type:</label>
        <select name="type" required>
            <option value="">-- Select Type --</option>
            <option value="Mail">Mail</option>
            <option value="File">File</option>
            <option value="API">API</option>
            <option value="SFTP">SFTP</option>
            <option value="Manual">Manual</option>
        </select>
        
        <label>Status:</label>
        <select name="active">
            <option value="Yes">Active</option>
            <option value="No">Inactive</option>
        </select>
        
        <div class="button-group">
            <button type="submit">Add Source</button>
            <button type="button" onclick="window.location.href='/sources'">Cancel</button>
        </div>
    </form>
</div>

</body>
</html>
